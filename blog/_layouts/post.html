---
layout: default
---
<article>
  <header class="post-header">
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <hr>
  <p><a href="{{ '/' | relative_url }}">&larr; Back to all posts</a></p>
</article>
